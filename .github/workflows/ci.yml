name: Continuous Integration (CI)

on:
  push:
    branches: [ main, develop, feat/deploy-complete-b ]
  pull_request:
    branches: [ main, develop, feat/deploy-complete-b ]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install gitleaks
      run: |
        GITLEAKS_VERSION="8.29.0"
        curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
        tar -xzf gitleaks.tar.gz gitleaks
        sudo mv gitleaks /usr/local/bin/gitleaks
        rm gitleaks.tar.gz
    
    - name: Run gitleaks scan
      run: gitleaks detect --source . --redact --report-path gitleaks-report.json

  test-backend:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-django flake8
    
    - name: Run tests with coverage
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        SECRET_KEY_ADMIN: ${{ secrets.SECRET_KEY_ADMIN }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
        TESTING: true
      run: |
        cd backend
        pytest --cov=. --cov-report=xml:coverage.xml --cov-report=html
    
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-backend
        path: backend/coverage.xml
        retention-days: 1
        if-no-files-found: error
    
    - name: Lint with flake8
      run: |
        cd backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test-ai-service:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd ai_service
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        cd ai_service
        pytest --cov=. --cov-report=xml:coverage.xml --cov-report=html

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-ai-service
        path: ai_service/coverage.xml
        retention-days: 1
        if-no-files-found: error

  test-frontend:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: cd frontend && npm ci --legacy-peer-deps

    - name: Run tests with coverage
      env:
        EXPO_PUBLIC_API_URL: http://localhost:8006/api
        EXPO_PUBLIC_WS_URL: ws://localhost:8006
        EXPO_PUBLIC_API_TIMEOUT: "5000"
      run: cd frontend && npm test -- --watchAll=false

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-frontend
        path: frontend/coverage/lcov.info
        retention-days: 1
        if-no-files-found: error

  build-frontend-web:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: frontend_web/package-lock.json

    - name: Install dependencies
      run: cd frontend_web && npm ci --legacy-peer-deps

    - name: Build
      env:
        REACT_APP_API_URL: http://localhost:8006/api
        REACT_APP_API_TIMEOUT: "10000"
      run: cd frontend_web && npm run build

  sonarqube:
    needs: [test-backend, test-frontend, build-frontend-web, test-ai-service]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download Backend Coverage
      uses: actions/download-artifact@v4
      with:
        name: coverage-backend
        path: backend/
    
    - name: Verify Backend Coverage
      run: |
        if [ -f backend/coverage.xml ]; then
          echo "Backend coverage file found"
          ls -lh backend/coverage.xml
        else
          echo "Backend coverage file not found"
        fi
    
    - name: Download AI Service Coverage
      uses: actions/download-artifact@v4
      with:
        name: coverage-ai-service
        path: ai_service/

    - name: Verify AI Service Coverage
      run: |
        if [ -f ai_service/coverage.xml ]; then
          echo "AI Service coverage file found"
          ls -lh ai_service/coverage.xml
        else
          echo "AI Service coverage file not found"
          exit 1
        fi

    - name: Download Frontend Mobile Coverage
      uses: actions/download-artifact@v4
      with:
        name: coverage-frontend
        path: frontend/coverage/

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install frontend dependencies (for tsconfig resolution)
      run: cd frontend && npm install --legacy-peer-deps

    - name: Fix backend coverage paths for SonarCloud
      run: python3 scripts/fix_coverage_paths.py

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar-${{ hashFiles('**/sonar-project.properties') }}
        restore-keys: ${{ runner.os }}-sonar-

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FAHAD }}
        SONAR_HOST_URL: https://sonarcloud.io

  notify:
    needs: [secret-scan, test-backend, test-frontend, build-frontend-web, test-ai-service, sonarqube]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Pipeline Summary
      run: |
        echo "======================================"
        echo "CI PIPELINE SUMMARY (TESTS ONLY)"
        echo "======================================"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Triggered by: ${{ github.actor }}"
        echo ""
        echo "======================================"
        echo "Job Status:"
        echo "======================================"
        echo "Secret Scan: ${{ needs.secret-scan.result }}"
        echo "Backend Tests: ${{ needs.test-backend.result }}"
        echo "Mobile Frontend Tests: ${{ needs.test-frontend.result }}"
        echo "Web Frontend Build: ${{ needs.build-frontend-web.result }}"
        echo "AI Service Tests: ${{ needs.test-ai-service.result }}"
        echo "SonarQube: ${{ needs.sonarqube.result }}"
        echo "======================================"
        
        CRITICAL_FAILED=false
        
        if [ "${{ needs.secret-scan.result }}" != "success" ]; then
          echo "CRITICAL: Secret scan failed"
          CRITICAL_FAILED=true
        fi
        
        if [ "${{ needs.test-backend.result }}" != "success" ]; then
          echo "CRITICAL: Backend tests failed"
          CRITICAL_FAILED=true
        fi
        
        if [ "${{ needs.test-frontend.result }}" != "success" ]; then
          echo "CRITICAL: Mobile frontend tests failed"
          CRITICAL_FAILED=true
        fi

        if [ "${{ needs.build-frontend-web.result }}" != "success" ]; then
          echo "CRITICAL: Web frontend build failed"
          CRITICAL_FAILED=true
        fi
        
        echo ""
        echo "======================================"
        
        if [ "$CRITICAL_FAILED" = true ]; then
          echo "FINAL STATUS: FAILED - Critical quality checks did not pass"
        else
          echo "FINAL STATUS: SUCCESS - All critical quality checks passed."
          echo "Your code is safe to be deployed via the Master Deployment Pipeline."
        fi
        
        echo "======================================"
