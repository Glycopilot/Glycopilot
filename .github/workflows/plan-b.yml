name: Deploy Enterprise (Plan B)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'ai_service/**'
      - 'infra/terraform-plan-b/**'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # Clés de ton compte actuel
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: glycopilot-backend
          IMAGE_TAG: latest
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build and push AI Service image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: glycopilot-ai-service
          IMAGE_TAG: latest
        run: |
          cd ai_service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (Injecting Secrets)
        working-directory: ./infra/terraform-plan-b
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"