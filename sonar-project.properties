# Triggering fresh analysis after pattern update in SonarCloud
sonar.projectKey=Glycopilot_Glycopilot
sonar.organization=glycopilot-1
sonar.projectVersion=1.0

# Sources à analyser
sonar.sources=backend/apps,backend/middleware,frontend/src,frontend_web/src
sonar.exclusions=**/migrations/**,**/node_modules/**,**/__pycache__/**,**/tests/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/venv/**,**/staticfiles/**,**/coverage/**,backend/apps/medications/management/commands/import_medications.py

# Configuration Python
sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Tests : Inclusion des tests backend et frontend
sonar.tests=backend/apps,frontend/src,frontend_web/src
sonar.test.inclusions=**/*test*.py,**/test_*.py,**/tests.py,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*.spec.ts,**/*.spec.tsx

# Coverage
sonar.python.coverage.reportPaths=backend/coverage.xml
# Le coverage.xml est normalisé par la CI (sed) pour avoir des chemins relatifs à la racine (backend/apps/...)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,frontend_web/coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=false

# Configuration GitHub pour l'intégration automatique
sonar.newCode.referenceBranch=develop

# Exclusions de couverture (fichiers sans logique métier ou difficiles à tester)
sonar.coverage.exclusions=\
  **/tests/**,\
  **/migrations/**,\
  **/__tests__/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/admin.py,\
  **/apps.py,\
  backend/core/wsgi.py,\
  backend/core/asgi.py,\
  backend/manage.py,\
  frontend_web/src/utils/pdfGenerator.ts,\
  backend/apps/medications/management/commands/import_medications.py,\
  frontend/src/services/libre2BackgroundService.ts,\
  frontend/src/hooks/useLibre2Sensor.ts,\
  frontend/src/components/profile/LocationTracker.web.tsx,\
  frontend/src/screens/SensorActivation.tsx

# Seuils de duplication
# LocationTracker.web.tsx est une version platform-specific de LocationTracker.tsx
sonar.cpd.exclusions=\
  **/tests/**,\
  **/migrations/**,\
  frontend/src/components/profile/LocationTracker.web.tsx

# Logs et verbosité
sonar.log.level=INFO
sonar.verbose=false

# Paramètres de sécurité
sonar.links.homepage=https://github.com/glycopilot/glycopilot
sonar.links.ci=https://github.com/glycopilot/glycopilot/actions
sonar.links.issue=https://github.com/glycopilot/glycopilot/issues
# Triggering CI run for final verification
