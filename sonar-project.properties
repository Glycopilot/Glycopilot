# Triggering fresh analysis after pattern update in SonarCloud
sonar.projectKey=Glycopilot_Glycopilot
sonar.organization=glycopilot-1
sonar.projectVersion=1.0

# Sources à analyser
sonar.sources=backend/apps,backend/middleware,backend/utils,frontend/src,frontend_web/src,ai_service/api,ai_service/core,ai_service/features,ai_service/models,ai_service/training
sonar.exclusions=**/migrations/**,**/node_modules/**,**/__pycache__/**,**/tests/**,**/*.test.js,**/venv/**,**/staticfiles/**,backend/apps/medications/management/commands/import_medications.py

# Configuration Python
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8

# Tests : les tests sont dans backend/apps (ex. apps/auth/test_*.py, apps/users/tests.py)
sonar.tests=backend/apps
sonar.test.inclusions=**/*test*.py,**/test_*.py,**/tests.py,**/*Test*.js,**/*.test.js

# Coverage
sonar.python.coverage.reportPaths=backend/coverage.xml,ai_service/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,frontend_web/coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=false

# Configuration GitHub pour l'intégration automatique
# SonarCloud détectera automatiquement les branches via GitHub Actions
# Pas besoin de définir sonar.branch.name manuellement

# Seuils pour nouvelles contributions (New Code)
# develop est la référence pour l'analyse de qualité
sonar.newCode.referenceBranch=develop

# Exclusions de couverture : bootstrap, UI lourde, intégrations externes (hors métrique Sonar)
sonar.coverage.exclusions=\
  **/tests/**,\
  **/migrations/**,\
  **/__tests__/**,\
  **/__pycache__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.css,\
  **/index.js,\
  **/index.jsx,\
  **/reportWebVitals.js,\
  **/setupProxy.js,\
  **/setupTests.js,\
  frontend/src/screens/Activities.tsx,\
  frontend/src/screens/meals.tsx,\
  frontend/src/screens/medicins.tsx,\
  frontend/src/screens/Journal.tsx,\
  frontend/src/screens/Stats.tsx,\
  frontend/src/screens/Medications.tsx,\
  frontend/src/screens/Predictions.tsx,\
  frontend/src/screens/SensorActivation.tsx,\
  frontend/src/utils/pdfGenerator.ts,\
  frontend/src/data/mockData.ts,\
  frontend/src/components/medications/MedFormModal.tsx,\
  frontend/src/components/medications/ActiveMedList.tsx,\
  frontend/src/components/medications/IntakeCard.tsx,\
  frontend/src/components/medications/MedicationAutocomplete.tsx,\
  frontend/src/components/meals/AddMealModal.tsx,\
  frontend/src/components/meals/BarcodeScannerModal.tsx,\
  frontend/src/navigation/navigation.tsx,\
  frontend_web/src/index.js,\
  frontend_web/src/reportWebVitals.js,\
  frontend_web/src/setupProxy.js,\
  frontend_web/src/setupTests.js,\
  frontend_web/src/App.jsx,\
  frontend_web/src/services/index.js,\
  frontend_web/src/services/authService.js,\
  frontend_web/src/lib/auth-redirect.js,\
  frontend_web/src/lib/logger.js,\
  frontend_web/src/components/ErrorBoundary.jsx,\
  frontend_web/src/components/tour/Tour.jsx,\
  frontend_web/src/components/tour/TourProvider.jsx,\
  frontend_web/src/components/tour/tour-steps.js,\
  frontend_web/src/components/tour/HelpButton.jsx,\
  frontend_web/src/screens/PatientsScreen.jsx,\
  frontend_web/src/screens/css/**,\
  backend/apps/auth/views.py,\
  backend/apps/auth/email_smtp.py,\
  backend/apps/auth/tokens.py,\
  backend/apps/glycemia/signals.py,\
  backend/apps/glycemia/services/**,\
  backend/apps/alerts/services/notify_proches.py,\
  backend/apps/alerts/services/push.py,\
  backend/apps/doctors/views/care_team_views.py,\
  backend/apps/doctors/admin.py,\
  backend/apps/doctors/utils.py,\
  backend/utils/helpers.py,\
  backend/apps/medications/management/commands/import_medications.py

# Seuils de duplication
# LocationTracker.web.tsx est une version platform-specific de LocationTracker.tsx
sonar.cpd.exclusions=\
  **/tests/**,\
  **/migrations/**,\
  frontend/src/components/profile/LocationTracker.web.tsx

# Logs et verbosité
sonar.log.level=INFO
sonar.verbose=false

# Langages
sonar.language=py,js,ts

# Paramètres de sécurité
sonar.links.homepage=https://github.com/glycopilot/glycopilot
sonar.links.ci=https://github.com/glycopilot/glycopilot/actions
sonar.links.issue=https://github.com/glycopilot/glycopilot/issues