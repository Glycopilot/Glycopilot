plugins {
  id 'com.android.library'
  id 'kotlin-android'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.libre2cgm'
version = '0.1.0'

android {
  namespace "expo.modules.libre2cgm"
  defaultConfig {
    versionCode 1
    versionName '0.1.0'
  }
  testOptions {
    unitTests.returnDefaultValues = true
  }
}

dependencies {
  implementation 'androidx.core:core-ktx:1.12.0'
  testImplementation 'junit:junit:4.13.2'
}
