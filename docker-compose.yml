services:
  # ========================================
  # MODE LOCAL (dev)
  # ========================================
  
  # --- Base de données MySQL (local) ---
  database_local:
    profiles: ["local"]
    image: mysql:8.0
    container_name: glycopilot-db-local
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$MYSQL_USER", "--password=$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (local) ---
  redis_local:
    profiles: ["local"]
    image: redis:7-alpine
    container_name: glycopilot-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend Django (local) ---
  backend_local:
    profiles: ["local"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    image: glycopilot-backend
    container_name: glycopilot-back-local
    ports:
      - "8006:8000"
    volumes:
      - ./backend:/app
    depends_on:
      database_local:
        condition: service_healthy
      redis_local:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py import_medications && python manage.py runserver 0.0.0.0:8000"

  # --- Scheduler rappels médicaments (local) ---
  medication_scheduler_local:
    profiles: ["local"]
    image: glycopilot-backend
    container_name: glycopilot-med-scheduler
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      backend_local:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "while true; do python manage.py send_medication_reminders; sleep 60; done"

  # --- Frontend React Native (local) ---
  frontend:
    profiles: ["local"]
    image: node:20-alpine
    container_name: glycopilot-front
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    volumes:
      - ./frontend:/app
    working_dir: /app
    environment:
      # Force Metro a encoder l'IP LAN de l'hote (et non l'IP interne du
      # container) dans le QR code, pour que le tel puisse se connecter via Wi-Fi.
      - REACT_NATIVE_PACKAGER_HOSTNAME=${REACT_NATIVE_PACKAGER_HOSTNAME:-}
    command: sh -c "npm install && npx expo start --lan"
    depends_on:
      backend_local:
        condition: service_started
    stdin_open: true
    tty: true
    restart: unless-stopped

  # --- AI Service FastAPI (local) ---
  ai_service:
    profiles: ["local"]
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: glycopilot-ai-local
    env_file:
      - ./ai_service/.env
    ports:
      - "8001:8001"
    volumes:
      - ./ai_service:/app
    depends_on:
      backend_local:
        condition: service_started
    restart: unless-stopped

  # --- AI Service FastAPI (AWS) ---
  ai_service_aws:
    profiles: ["aws"]
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: glycopilot-ai-aws
    restart: always
    # Crée un secret GitHub spécifique AI_ENV_FILE si elle a ses propres secrets
    env_file:
      - ./ai_service/.env.prod 
    networks:
      - glycopilot-network
    expose:
      - "8001" # Expose en interne uniquement, PAS de 'ports:'

  # --- Frontend Web (local) ---
  frontend_web:
    profiles: ["local"]
    image: node:20-alpine
    container_name: glycopilot-front-web
    ports:
      - "3000:3000"
    volumes:
      - ./frontend_web:/app
      - frontend_web_modules:/app/node_modules
    working_dir: /app
    environment:
      - FAST_REFRESH=false
    command: sh -c "npm install && npm start"
    depends_on:
      - backend_local
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ========================================
  # MODE AWS (production)
  # ========================================
  
  # --- Base de données PostgreSQL (AWS) ---
  database_aws:
    profiles: ["aws"]
    image: postgres:16-alpine
    container_name: glycopilot-db-aws
    restart: always
    env_file:
      - ./backend/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - glycopilot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (AWS) ---
  redis_aws:
    profiles: ["aws"]
    image: redis:7-alpine
    container_name: glycopilot-redis-aws
    restart: always
    volumes:
      - redis_data_aws:/data
    networks:
      - glycopilot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend Django (AWS avec Daphne pour WebSocket) ---
  backend_aws:
    profiles: ["aws"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glycopilot-back-aws
    restart: always
    env_file:
      - ./backend/.env.prod
    environment:
      Django_ENV: production
      DB_ENGINE: postgresql
      DB_HOST: database_aws
      DB_PORT: 5432
    # Daphne au lieu de Gunicorn pour supporter WebSocket
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py import_medications && daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      database_aws:
        condition: service_healthy
      redis_aws:
        condition: service_healthy
    networks:
      - glycopilot-network
    expose:
      - "8000"

  # --- Scheduler rappels médicaments (AWS) ---
  medication_scheduler_aws:
    profiles: ["aws"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glycopilot-med-scheduler-aws
    restart: always
    env_file:
      - ./backend/.env.prod
    environment:
      Django_ENV: production
      DB_ENGINE: postgresql
      DB_HOST: database_aws
      DB_PORT: 5432
    depends_on:
      backend_aws:
        condition: service_started
    networks:
      - glycopilot-network
    command: >
      sh -c "while true; do python manage.py send_medication_reminders; sleep 60; done"

  # --- Nginx Reverse Proxy (AWS) ---
  nginx:
    profiles: ["aws"]
    image: nginx:alpine
    container_name: glycopilot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./.nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend_aws
    networks:
      - glycopilot-network

# ========================================
# VOLUMES
# ========================================
volumes:
  # Local volumes
  mysql_data:
  redis_data:
  frontend_web_modules:
  
  # AWS volumes
  postgres_data:
  redis_data_aws:
  static_volume:
  media_volume:

# ========================================
# NETWORKS
# ========================================
networks:
  glycopilot-network:
    driver: bridge
